<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Umut & Gaye</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:Poppins;
    background:#0f0f0f;
    color:white;
    text-align:center;
    overflow-x:hidden;
}

/* Giriş Davetiye */
.inviteOverlay{
    position:fixed;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:10;
    text-shadow:1px 1px 5px black;
    overflow:hidden;
}

/* Blur ve karışık arka plan */
.inviteOverlay::before {
    content:"";
    position:absolute;
    top:0; left:0;
    width:100%; height:100%;
    background:
        url('galeri1.jpg') 0% 0% / 25% 100% no-repeat,
        url('galeri2.jpg') 25% 0% / 25% 100% no-repeat,
        url('galeri3.jpg') 50% 0% / 25% 100% no-repeat,
	url('galeri2.jpg') 25% 0% / 25% 100% repeat,
        url('galeri4.jpg') 75% 0% / 25% 100% no-repeat;
    filter: blur(15px) brightness(0.4);
    z-index:-1;
}

/* Daveti aç butonu */
.openBtn{
    margin-top:25px;
    padding:16px 28px;
    font-size:18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#ff4d6d;
    color:white;
}

/* Hero Alanı */
.hero{
    display:none;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:30px;
}
.hero img{
    width:320px;
    max-width:80%;
    margin-bottom:25px;
}
h1{ font-family:"Playfair Display"; font-size:52px; margin:0;}
.date{ opacity:.8; margin-top:10px; font-size:18px;}
#countdown{ display:flex; gap:20px; margin-top:35px;}
.timebox{ background:#1d1d1d; padding:20px 25px; border-radius:12px;}
.timebox span{ display:block; font-size:28px; font-weight:bold;}
.timebox small{ opacity:.6;}
.message{ margin-top:50px; font-size:22px; max-width:500px; line-height:1.6;}
.buttons{ margin-top:35px; display:flex; gap:15px; flex-wrap:wrap; justify-content:center;}
button{ padding:14px 22px; border:none; border-radius:10px; font-size:16px; cursor:pointer; background:#ff4d6d; color:white;}
button.secondary{background:#333;}

/* Konfeti canvas */
canvas{position:fixed; top:0; left:0; pointer-events:none; z-index:5;}

/* Galeri */
.gallery{
    display:flex;
    gap:15px;
    justify-content:center;
    margin-top:30px;
    overflow-x:auto;
    padding:10px;
}
.gallery img{
    width:180px;
    border-radius:15px;
    cursor:pointer;
    transition:0.5s;
}
.gallery img:hover{
    transform:scale(1.05);
}
</style>
</head>

<body>

<!-- Giriş Davetiye -->
<div class="inviteOverlay" id="invite">
<h2>Umut & Gaye</h2>
<p>Düğün Daveti</p>
<button class="openBtn" onclick="openInvite()">Daveti Aç</button>
</div>

<!-- Hero Alanı -->
<div class="hero" id="hero">
<img src="couple.png" alt="Umut & Gaye Karikatür">

<h1>Umut & Gaye</h1>
<div class="date">12 Temmuz 2026 • 19:00</div>

<div id="countdown">
<div class="timebox"><span id="days"></span><small>Gün</small></div>
<div class="timebox"><span id="hours"></span><small>Saat</small></div>
<div class="timebox"><span id="minutes"></span><small>Dakika</small></div>
<div class="timebox"><span id="seconds"></span><small>Saniye</small></div>
</div>

<div class="message">
"Düğün ne zaman diyorduk, bi anda oldu kuzum. Sizi de bekleriz ❤️"
</div>

<div class="buttons">
<button onclick="openMap()">Mekana Git</button>
<button class="secondary" onclick="addCalendar()">Takvime Ekle</button>
</div>

<!-- Galeri -->
<div class="gallery">
<img src="galeri1.jpg" alt="">
<img src="galeri2.jpg" alt="">
<img src="galeri3.jpg" alt="">
<img src="galeri4.jpg" alt="">
</div>

</div>

<canvas id="confetti"></canvas>

<audio id="music" loop>
<source src="music.mp3" type="audio/mp3">
</audio>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
// Davetiye aç
function openInvite(){
    document.getElementById("invite").style.display="none";
    document.getElementById("hero").style.display="flex";
    document.getElementById("music").play();
    document.getElementById("music").volume = 0.1; // 0.0 → sessiz, 1.0 → tam ses
}

// Geri sayım
const weddingDate = new Date("July 12, 2026 19:00:00").getTime();
setInterval(function(){
    const now = new Date().getTime();
    const distance = weddingDate - now;
    document.getElementById("days").innerHTML = Math.floor(distance/(1000*60*60*24));
    document.getElementById("hours").innerHTML = Math.floor((distance%(1000*60*60*24))/(1000*60*60));
    document.getElementById("minutes").innerHTML = Math.floor((distance%(1000*60*60))/(1000*60));
    document.getElementById("seconds").innerHTML = Math.floor((distance%(1000*60))/1000);
},1000);

// Mekan ve Takvim
function openMap(){ window.open("https://maps.app.goo.gl/jqYWsk77LwBGdDbb6"); }
function addCalendar(){ window.open("https://calendar.google.com/calendar/render?action=TEMPLATE&text=Umut%20%26%20Gaye%20Wedding&dates=20260712T160000Z/20260712T200000Z"); }

// Konfeti
setInterval(()=>{
    confetti({particleCount:4, spread:70, origin:{y:0.6}});
},900);
</script>

</body>
</html>
